; ═══════════════════════════════════════════════════════════
;  components/polybar/shared/config.ini — Dracula theme
;  Válido para todas las distros
; ═══════════════════════════════════════════════════════════

[colors]
background     = #282a36
background-alt = #44475a
foreground     = #f8f8f2
primary        = #bd93f9
secondary      = #ff79c6
alert          = #ff5555
disabled       = #6272a4

[bar/main]
width            = 100%
height           = 27pt
radius           = 0
background       = ${colors.background}
foreground       = ${colors.foreground}
line-size        = 3pt
border-size      = 0pt
padding-left     = 1
padding-right    = 1
module-margin    = 1
separator        = |
separator-foreground = ${colors.disabled}
font-0           = "Hack Nerd Font:size=10;2"
modules-left     = bspwm xwindow
modules-center   = date
modules-right    = pulseaudio memory cpu network battery
cursor-click     = pointer
tray-position    = right
wm-restack       = bspwm
enable-ipc       = true

[module/bspwm]
type                     = internal/bspwm
label-focused            = %index%
label-focused-background = ${colors.background-alt}
label-focused-underline  = ${colors.primary}
label-focused-padding    = 1
label-occupied           = %index%
label-occupied-padding   = 1
label-urgent             = %index%!
label-urgent-background  = ${colors.alert}
label-urgent-padding     = 1
label-empty              = %index%
label-empty-foreground   = ${colors.disabled}
label-empty-padding      = 1

[module/xwindow]
type  = internal/xwindow
label = %title:0:50:...%

[module/date]
type     = internal/date
interval = 1
date     = %Y-%m-%d
time     = %H:%M:%S
label    = %date%  %time%
label-foreground = ${colors.primary}

[module/pulseaudio]
type                      = internal/pulseaudio
format-volume-prefix      = "  "
format-volume-prefix-foreground = ${colors.primary}
format-volume             = <label-volume>
label-volume              = %percentage%%
label-muted               = muted
label-muted-foreground    = ${colors.disabled}

[module/memory]
type             = internal/memory
interval         = 2
format-prefix    = "  "
format-prefix-foreground = ${colors.secondary}
label            = %percentage_used:2%%

[module/cpu]
type             = internal/cpu
interval         = 2
format-prefix    = "  "
format-prefix-foreground = ${colors.primary}
label            = %percentage:2%%

[module/network]
type             = internal/network
interface-type   = wireless
interval         = 5
label-connected  = %{F#bd93f9}  %{F-}%essid%
label-disconnected = %{F#6272a4}睊 offline%{F-}

[module/battery]
type             = internal/battery
full-at          = 99
low-at           = 5
battery          = BAT0
adapter          = AC
format-charging  = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
ramp-capacity-0  =
ramp-capacity-1  =
ramp-capacity-2  =
ramp-capacity-3  =
ramp-capacity-4  =
animation-charging-0 =
animation-charging-1 =
animation-charging-framerate = 750
