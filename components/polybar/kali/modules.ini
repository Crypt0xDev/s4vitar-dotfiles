;; ════════════════════════════════════════════
;;  Workspaces
;; ════════════════════════════════════════════

[module/workspaces]
type          = internal/xworkspaces
pin-workspaces = true
enable-click   = true
enable-scroll  = true

icon-0       = 1;∙
icon-1       = 2;∙
icon-2       = 3;∙
icon-3       = 4;∙
icon-4       = 5;∙
icon-default = ∙

format         = <label-state>
format-padding = 0

label-active            = "∙ "
label-active-foreground = ${color.ac}
label-active-background = ${color.bg}

label-occupied            = "%icon% "
label-occupied-foreground = ${color.dim}
label-occupied-background = ${color.bg}

label-urgent            = "%icon% "
label-urgent-foreground = ${color.red}
label-urgent-background = ${color.bg}

label-empty            = "%icon% "
label-empty-foreground = ${color.gray}
label-empty-background = ${color.bg}

;; ════════════════════════════════════════════
;;  Sistema
;; ════════════════════════════════════════════

[module/cpu]
type     = internal/cpu
interval = 2

format-prefix            =
format-prefix-foreground = ${color.orange}
format                   = <label>
label                    = %percentage%%

format-warn-prefix            =
format-warn-prefix-foreground = ${color.red}
format-warn                   = <label-warn>
label-warn                    = %percentage%%
label-warn-foreground         = ${color.red}

[module/memory]
type     = internal/memory
interval = 2

format-prefix            =
format-prefix-foreground = ${color.cyan}
format                   = <label>
label                    = %percentage_used%%

format-warn-prefix            =
format-warn-prefix-foreground = ${color.red}
format-warn                   = <label-warn>
label-warn                    = %percentage_used%%
label-warn-foreground         = ${color.red}

[module/fs-root]
type    = internal/fs
mount-0 = /
label-mounted            = %percentage_used%%
label-mounted-foreground = ${color.ac}
format-mounted-suffix    = " used of %mountpoint%"

;; ════════════════════════════════════════════
;;  Redes y VPN
;; ════════════════════════════════════════════

;; IP de eth0 (cable) o wlan0 (Wi-Fi) — "Disconnected" si no hay conexión
[module/network]
type     = custom/script
exec     = ~/.config/polybar/scripts/bin/network.sh
interval = 5
format   = <label>

;; IP de tun0 (VPN HTB) — "Disconnected" si no hay interfaz
[module/vpn]
type     = custom/script
exec     = ~/.config/polybar/scripts/bin/vpn.sh
interval = 5
format   = <label>

;; IP maquiana VICTIMA — "No target" si no hay objetivo
[module/target]
type     = custom/script
exec     = ~/.config/polybar/scripts/bin/target.sh
interval = 5
format   = <label>

;; ════════════════════════════════════════════
;;  Audio
;; ════════════════════════════════════════════
;;  Audio
;; ════════════════════════════════════════════

;; ALSA — click derecho abre pavucontrol
[module/alsa]
type = internal/alsa

format-volume = <ramp-volume>
format-muted  = <label-muted>

label-muted            = %{A3:pavucontrol &:}  %{A}
label-muted-foreground = ${color.gray}

ramp-volume-0          = %{A3:pavucontrol &:} %{A}
ramp-volume-1          = %{A3:pavucontrol &:} %{A}
ramp-volume-2          = %{A3:pavucontrol &:} %{A}
ramp-volume-3          = %{A3:pavucontrol &:} %{A}
ramp-volume-4          = %{A3:pavucontrol &:} %{A}
ramp-volume-foreground = ${color.white}

;; Alternativa — soporta speaker + headphone
[module/volume]
type            = internal/volume
speaker-mixer   = Speaker
headphone-mixer = Headphone
headphone-id    = 9

format-volume           = <ramp-volume> <label-volume>
label-volume            = %percentage%%
label-volume-foreground = ${color.white}

format-muted-prefix     = " "
format-muted-foreground = ${color.gray}
label-muted             = sound muted

ramp-volume-0          =
ramp-volume-1          =
ramp-volume-2          =
ramp-volume-3          =
ramp-volume-foreground = ${color.gray}

ramp-headphones-0          =
ramp-headphones-1          =
ramp-headphones-foreground = ${color.gray}

;; ════════════════════════════════════════════
;;  Energía
;; ════════════════════════════════════════════

;; Cambia BAT1/ACAD según tu sistema (ls /sys/class/power_supply/)
[module/battery]
type          = internal/battery
battery       = BAT1
adapter       = ACAD
full-at       = 99
poll-interval = 2
time-format   = %H:%M

format-charging    = <animation-charging>
format-discharging = <ramp-capacity>

format-full            = <label-full>
format-full-foreground = ${color.white}
label-full             =

ramp-capacity-0          =
ramp-capacity-1          =
ramp-capacity-2          =
ramp-capacity-3          =
ramp-capacity-4          =
ramp-capacity-5          =
ramp-capacity-6          =
ramp-capacity-7          =
ramp-capacity-8          =
ramp-capacity-9          =
ramp-capacity-foreground = ${color.white}

animation-charging-0          =
animation-charging-1          =
animation-charging-2          =
animation-charging-3          =
animation-charging-4          =
animation-charging-5          =
animation-charging-6          =
animation-charging-7          =
animation-charging-8          =
animation-charging-9          =
animation-charging-foreground = ${color.white}
animation-charging-framerate  = 750

;; ════════════════════════════════════════════
;;  UI y Misc
;; ════════════════════════════════════════════

;; Data y hora
[module/date]
type     = internal/date
interval = 1
date     = %b %e
time     = %k : %M

format            = <label>
format-foreground = ${color.white}
label             = %date%  |  %time%
label-font        = 6

[module/xwindow]
type     = internal/xwindow
format   = <label>
label-maxlen = 75

[module/title]
type   = internal/xwindow
format            = <label>
format-foreground = ${color.fg}
format-font       = 2
label             = %title%
label-maxlen      = 20
label-empty       = Desktop

[module/xkeyboard]
type        = internal/xkeyboard
blacklist-0 = num lock

format-prefix            =
format-prefix-foreground = ${color.gray}
label-layout             = %layout%

label-indicator-padding    = 2
label-indicator-background = ${color.ac}

[module/xbacklight]
type   = internal/xbacklight
format = <ramp> <label>

ramp-0           =
ramp-1           =
ramp-2           =
ramp-foreground  = ${color.gray}
label-foreground = ${color.white}

;; ════════════════════════════════════════════
;;  Media
;; ════════════════════════════════════════════

[module/mpd]
type     = internal/mpd
interval = 2

format-online            = <label-song>
format-online-foreground = ${color.fg}

label-song          = %title%
label-song-maxlen   = 12
label-song-ellipsis = true
label-offline       = Offline


;; ════════════════════════════════════════════
;;  Menús
;; ════════════════════════════════════════════

;; Requiere ~/.config/polybar/scripts/powermenu_alt
[module/sysmenu]
type       = custom/text
format     = "濾"
click-left = ~/.config/polybar/scripts/powermenu_alt

[module/power-menu]
type = custom/menu

label-open           =
label-close          =
label-separator      = /
label-separator-margin = 1

menu-0-0            = Terminate WM
menu-0-0-foreground = ${color.ac}
menu-0-0-exec       = bspc quit -1
menu-0-1            = Reboot
menu-0-1-foreground = ${color.ac}
menu-0-1-exec       = menu-open-1
menu-0-2            = Power off
menu-0-2-foreground = ${color.ac}
menu-0-2-exec       = menu-open-2
menu-0-3            = Lock
menu-0-3-foreground = ${color.ac}
menu-0-3-exec       = lockscreen

menu-1-0            = Cancel
menu-1-0-foreground = ${color.ac}
menu-1-0-exec       = menu-open-0
menu-1-1            = Reboot
menu-1-1-foreground = ${color.ac}
menu-1-1-exec       = sudo reboot

menu-2-0            = Power off
menu-2-0-foreground = ${color.ac}
menu-2-0-exec       = sudo poweroff
menu-2-1            = Cancel
menu-2-1-foreground = ${color.ac}
menu-2-1-exec       = menu-open-0

[module/app-menu]
type        = custom/menu
label-open  =
label-close =

menu-0-0      = Vimperator
menu-0-0-exec = web
menu-0-1      = Termite
menu-0-1-exec = termite
menu-0-2      = Pcmanfm
menu-0-2-exec = pcmanfm

;; ════════════════════════════════════════════
;;  Texto y separadores
;; ════════════════════════════════════════════

[module/logo]
type              = custom/text
format            = ""
format-foreground = ${color.ac}

[module/sep]
type               = custom/text
format             = " | "
format-font        = 1
format-foreground  = ${color.fg}

[module/sep2]
type               = custom/text
format             = "   "
format-foreground  = ${color.fg}

;; ════════════════════════════════════════════
;;  Lanzadores de apps
;; ════════════════════════════════════════════

[module/term]
type               = custom/text
format             = %{T3}%{T-}
format-foreground  = ${color.black}
format-background  = ${color.bg}
format-padding     = 0
click-left         = termite &

[module/web]
type               = custom/text
format             = %{T3}%{T-}
format-foreground  = ${color.white}
format-background  = ${color.bg}
format-padding     = 0
click-left         = firefox &

[module/files]
type               = custom/text
format             = %{T3}%{T-}
format-foreground  = ${color.blue}
format-background  = ${color.bg}
format-padding     = 0
click-left         = thunar &

[module/edit]
type               = custom/text
format             = %{T3}%{T-}
format-foreground  = ${color.blue-gray}
format-background  = ${color.bg}
format-padding     = 0
click-left         = geany &

[module/apps]
type               = custom/text
format             = %{T3}%{T-}
format-foreground  = ${color.fg}
format-background  = ${color.bg}
format-padding     = 0
click-left         = ~/.config/polybar/scripts/launcher &

;; ════════════════════════════════════════════
;;  Misc
;; ════════════════════════════════════════════

;; Requiere token en ~/.git-token
[module/github]
type             = internal/github
token            = ${file:~/.git-token}
label            = %notifications%
label-padding    = 2
label-background = ${color.ac}
label-foreground = ${color.black}

[module/counter]
type     = internal/counter
format   = <counter>
interval = 0.1

;; ════════════════════════════════════════════
;;  Tray
;; ════════════════════════════════════════════

[module/tray]
type = internal/tray
tray-maxsize    = 16
tray-padding    = 4
tray-background = ${color.bg}

