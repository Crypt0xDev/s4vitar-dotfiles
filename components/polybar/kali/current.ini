;; ════════════════════════════════════════════
;;  Global WM
;; ════════════════════════════════════════════

[global/wm]
margin-bottom = 0
margin-top    = 0

;; ════════════════════════════════════════════
;;  Includes — colores y módulos
;; ════════════════════════════════════════════

include-file = ~/.config/polybar/colors_active.ini
include-file = ~/.config/polybar/modules.ini

;; ════════════════════════════════════════════
;;  Plantilla base (heredada por todas las barras)
;; ════════════════════════════════════════════

[bar/base]
monitor          =
monitor-fallback =
monitor-strict   = false
bottom           = false
fixed-center     = true

;; Pill shape
height      = 32
radius      = 16.0
border-size = 0
line-size   = 0

;; Colores HTB
background = ${color.bg}
foreground = ${color.white}

;; Espaciado
padding-left        = 2
padding-right       = 2
module-margin-left  = 1
module-margin-right = 1

;; Fuentes
;;   font-0  texto normal
;;   font-1  texto bold grande
;;   font-2  iconos grandes (Nerd Font)
;;   font-3  monospace alternativo
;;   font-4  Montserrat títulos
;;   font-5  Helvetica Rounded
;;   font-6  Hurmit iconos pixel
font-0 = "Iosevka Nerd Font:size=13;3"
font-1 = "Iosevka Nerd Font:bold:size=24;2"
font-2 = "Iosevka Nerd Font:size=22;6"
font-3 = "Source Code Pro:size=10;3"
font-4 = "Montserrat Medium:style=Medium:size=12;3"
font-5 = "Helvetica Rounded:style=Bold:size=10.5;3"
font-6 = "Hurmit Nerd Font Mono:style=medium:pixelsize=17;3"

;; WM / IPC
wm-restack        = bspwm
enable-ipc        = true
override-redirect = true

;; Cursor
cursor-click  = pointer
cursor-scroll = ns-resize

;; ════════════════════════════════════════════
;;  Izquierda — logo · fecha · ethernet · vpn
;; ════════════════════════════════════════════

[bar/logo]
inherit = bar/base
width    = 4%
offset-x = 1%
offset-y = 12
modules-center = logo

[bar/date]
inherit = bar/base
width    = 14%
offset-x = 6%
offset-y = 12
modules-center = date

[bar/network]
inherit = bar/base
width    = 9%
offset-x = 21%
offset-y = 12
modules-center = network

[bar/vpn]
inherit = bar/base
width    = 9%
offset-x = 31%
offset-y = 12
modules-center = vpn

;; ════════════════════════════════════════════
;;  Centro — workspaces
;; ════════════════════════════════════════════

[bar/workspaces]
inherit = bar/base
width    = 18%
offset-x = 41%
offset-y = 12
fixed-center   = true
modules-center = workspaces

;; ════════════════════════════════════════════
;;  Derecha — target HTB · menú sistema
;; ════════════════════════════════════════════

[bar/target]
inherit = bar/base
width    = 32%
offset-x = 62%
offset-y = 12
modules-center = target

[bar/sysmenu]
inherit = bar/base
width    = 4%
offset-x = 94%
offset-y = 12
modules-center = sysmenu

;; ════════════════════════════════════════════
;;  Settings globales
;; ════════════════════════════════════════════

[settings]
screenchange-reload    = true
compositing-background = source
compositing-foreground = over
compositing-border     = over
pseudo-transparency    = false
